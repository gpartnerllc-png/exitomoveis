<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Êxito | Móveis Planejados</title>
    <link rel="icon" type="image/png" href="https://img.freepik.com/free-vector/logo-luxury-design-gradient-illustration_31800107.jpg">
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-text: #1d1d1f;
            --apple-blue: #0066cc;
            --shadow-premium: 0 20px 40px rgba(0,0,0,0.06);
        }

        body {
            margin: 0;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header { padding: 50px 20px 0; text-align: center; }
        header h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 600; margin: 0; }

        /* Palco Principal */
        .scene {
            width: 100%;
            height: 550px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            touch-action: pan-y; /* Estabiliza mobile */
        }

        .carousel-3d {
            width: 240px;
            height: 340px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .carousel-item {
            position: absolute;
            width: 240px;
            height: 340px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: var(--shadow-premium);
            backface-visibility: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* EFEITO MOEDA 3D NAS FOTOS */
        .coin-container {
            width: 160px;
            height: 160px;
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .coin-spinner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCoin 10s linear infinite;
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .coin-face img { width: 100%; height: 100%; object-fit: cover; }

        /* 4 Lados da Moeda */
        .face-1 { transform: rotateY(0deg) translateZ(2px); }
        .face-2 { transform: rotateY(90deg) translateZ(2px); }
        .face-3 { transform: rotateY(180deg) translateZ(2px); }
        .face-4 { transform: rotateY(270deg) translateZ(2px); }

        @keyframes rotateCoin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Ajuste Mobile */
        @media (max-width: 768px) {
            .scene { height: 450px; }
            .carousel-3d { width: 200px; height: 300px; }
            .carousel-item { width: 200px; height: 300px; }
            .coin-container { width: 130px; height: 130px; }
            .carousel-item:hover { transform: none !important; } /* Trava o zoom no mobile */
        }

        /* Controles */
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: -20px; padding-bottom: 40px; }
        .nav-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; font-size: 24px; z-index: 100;
        }

        /* Rodapé em Linhas */
        footer { background: white; padding: 60px 20px; border-top: 1px solid #e5e5e7; text-align: center; }
        .trust-row, .payment-row { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        .trust-badge { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #424245; }
        .trust-badge svg { width: 30px; height: 30px; fill: #1d1d1f; }
        .payment-row img { height: 22px; opacity: 0.8; }
        .legal-row { font-size: 12px; color: #86868b; border-top: 1px solid #f2f2f2; padding-top: 20px; }
    </style>
</head>
<body>

<header>
    <h5>Fábrica de Móveis</h5>
    <h1>Êxito | Móveis</h1>
</header>

<div class="scene">
    <div class="carousel-3d" id="carousel">
        <div class="carousel-item" onclick="openLeadModal('https://exitomoveis.com/', 'Cozinha Lux')">
            <div class="coin-container">
                <div class="coin-spinner">
                    <div class="coin-face face-1"><img src="https://images.unsplash.com/photo-1556911220-e15224bbafb0?w=300"></div>
                    <div class="coin-face face-2"><img src="https://images.unsplash.com/photo-1599619367235-f18314f7b600?w=300"></div>
                    <div class="coin-face face-3"><img src="https://images.unsplash.com/photo-1565183053673-a551b9e2c608?w=300"></div>
                    <div class="coin-face face-4"><img src="https://images.unsplash.com/photo-1601056637335-5b4a53075b94?w=300"></div>
                </div>
            </div>
            <h3>Cozinha Lux</h3>
            <p>Conceito Aberto</p>
        </div>
        </div>
</div>

<div class="controls">
    <button class="nav-btn" id="prevBtn">←</button>
    <button class="nav-btn" id="nextBtn">→</button>
</div>

<footer>
    <div class="trust-row">
        <div class="trust-badge">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            <span>Ambiente Seguro</span>
        </div>
        <div class="trust-badge">
            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            <span>Fábrica Própria</span>
        </div>
    </div>
    <div class="payment-row">
        <img src="https://img.icons8.com/color/48/visa.png">
        <img src="https://img.icons8.com/color/48/mastercard.png">
        <img src="https://img.icons8.com/color/48/elo.png">
        <img src="https://logopts.com/wp-content/uploads/pix-logo.png">
    </div>
    <div class="legal-row">
        <p><strong>ÊXITO MÓVEIS PLANEJADOS</strong></p>
        <p>𝑪𝑵𝑷𝑱: 05.643.034/0001-18</p>
    </div>
</footer>

<script>
    const carousel = document.getElementById('carousel');
    const items = document.querySelectorAll('.carousel-item');
    const n = items.length;
    let currAngle = 0;

    function init() {
        const radius = window.innerWidth < 768 ? 300 : 450;
        items.forEach((item, i) => {
            item.style.transform = `rotateY(${i * (360 / n)}deg) translateZ(${radius}px)`;
        });
    }

    // FUNÇÃO DAS SETAS REPARADA
    document.getElementById('nextBtn').onclick = () => {
        currAngle -= (360 / n);
        carousel.style.transform = `rotateY(${currAngle}deg)`;
    };

    document.getElementById('prevBtn').onclick = () => {
        currAngle += (360 / n);
        carousel.style.transform = `rotateY(${currAngle}deg)`;
    };

    // Auto-rotação suave
    setInterval(() => {
        currAngle -= (360 / n);
        carousel.style.transform = `rotateY(${currAngle}deg)`;
    }, 4000);

    window.onresize = init;
    init();
</script>
</body>
</html>
